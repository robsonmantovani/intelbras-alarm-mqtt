name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Set package visibility to public
        if: github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const packageName = 'intelbras-alarm-mqtt';
            const owner = context.repo.owner;
            // Use REST API to list packages (GraphQL enum PackageType doesn't accept CONTAINER in some schemas)
            const listResp = await github.rest.packages.listPackagesForUser({
              username: owner,
              package_type: 'container',
            });
            const pkg = listResp.data.find(p => p.name === packageName);
            if (!pkg) {
              console.log('⚠️ Package not found yet (may take a moment to register after first push)');
              return;
            }
            console.log(`Found package id=${pkg.id} visibility=${pkg.visibility}`);
            if (pkg.visibility === 'public') {
              console.log('✅ Package already public');
              return;
            }
            await github.rest.packages.updatePackageForUser({
              package_type: 'container',
              package_name: packageName,
              username: owner,
              visibility: 'public',
            });
            console.log('✅ Package set to public visibility');

      - name: Run Trivy vulnerability scanner
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-image-results.sarif'
        continue-on-error: true

      - name: Upload Trivy scan results to GitHub Security tab
        if: github.event_name != 'pull_request' && always()
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-image-results.sarif'
        continue-on-error: true
