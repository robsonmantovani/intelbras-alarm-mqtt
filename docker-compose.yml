version: "3.8"

services:
  intelbras-alarm-bridge:
    build: .
    container_name: intelbras-alarm-bridge
    restart: unless-stopped
    environment:
      - CONFIG_PATH=/config/config.yml
      - TZ=America/Sao_Paulo
    volumes:
      - ./config.yml:/config/config.yml:ro
    # Network mode: use 'host' if MQTT broker is on the same host,
    # or use a custom network if MQTT is in another container
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
