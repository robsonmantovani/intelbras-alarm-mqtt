# Ruff configuration
[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    ".venv",
]

[tool.ruff.lint]
# Allow common patterns that ruff normally flags
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort (import sorting)
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (we use black/ruff line-length=100)
    "E402",  # module level import not at top
    "B008",  # do not perform function calls in argument defaults
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = [
    "E702",  # multiple statements on one line (colons) - common in test code
    "F811",  # redefinition - common in test fakes
    "B017",  # assert raises with a generic exception
]
"__init__.py" = ["F401"]  # allow unused imports in __init__.py
